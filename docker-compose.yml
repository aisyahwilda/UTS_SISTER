version: "3.9"

services:
  aggregator:
    build: .
    image: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      - ./dedup.db:/app/dedup.db

  publisher:
    image: uts-aggregator
    depends_on:
      - aggregator
    command:
      [
        "python",
        "-m",
        "src.publisher_sim",
        "--base-url",
        "http://aggregator:8080",
        "--total",
        "5000",
        "--duplicate-ratio",
        "0.2",
      ]
